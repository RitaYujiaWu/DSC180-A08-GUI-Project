# GUI Benchmark Runner Configuration
# Copy to config.yaml and set paths for your machine.

# Base model (HuggingFace id or local path)
base_model: "Qwen/Qwen3-VL-4B-Instruct"

# Optional: LoRA adapter directory (e.g. ckpt_ep220). Leave empty for baseline.
lora_path: ""

# Data
# - ui-vision: PATH_TO/data/ui-vision/
# - mmbench-gui: PATH_TO/data/MMBench-GUI/
# - mind2web: PATH_TO/data/mind2web/ (scores_all_data.pkl + test_website/, etc.)
# - AndroidControl: PATH_TO/android_control/*.parquet

# Output base (results will be under output/{model_name}/{benchmark}/)
output_root: null   # null = use ./results/output_root
ac_output_root: null  # null = use ./results/android_control

# Eval settings
prompt: "strict-grounding"
batch_size_uivision: 64
batch_size_mmbench: 128
tensor_parallel: 1
temperature: 0.0
think_mode: 1
